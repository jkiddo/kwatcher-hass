send_message:
  name: Send Message
  description: Send a text message to the K-Watch display
  fields:
    message:
      name: Message
      description: The message body to display on the watch
      required: true
      example: "Dinner is ready"
      selector:
        text:
    title:
      name: Title
      description: Short title for the notification (max 17 bytes UTF-8)
      default: "HA"
      example: "Home"
      selector:
        text:
